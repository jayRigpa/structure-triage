<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Presenting Structure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>
  <main style="max-width:620px;margin:0 auto;padding:5rem 1.5rem;">
    <p class="eyebrow">Received</p>
    <h1 style="font-family:var(--display);font-weight:600;font-size:2rem;line-height:1.15;margin-bottom:1rem;">
      Thank you — this is how it gets better.
    </h1>
    <p style="color:var(--ink);">Your feedback landed. Expect two short follow-up
    questions in about a week. Until then, whatever the reading surfaced —
    use it lightly, test it against experience, and set it down.</p>
    <p style="margin-top:2rem;"><a href="/" style="color:var(--pine);">← Back to the instrument</a></p>
  </main>
